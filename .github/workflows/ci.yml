name: ci

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Test
        run: pytest -q
      - name: CLI smoke
        run: |
          python -m rrann health --seed 2.4 --bits 1024
          python -m rrann roll --seed 2.4 --context ci -n 0 --out /tmp/r.json
          python -m rrann verify /tmp/r.json --seed 2.4

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust/rrann-core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install MPFR/GMP
        run: sudo apt-get update && sudo apt-get install -y libgmp-dev libmpfr-dev
      - name: Test
        run: cargo test

  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go/rrann
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install MPFR/GMP
        run: sudo apt-get update && sudo apt-get install -y libgmp-dev libmpfr-dev
      - name: Build Rust staticlib + Go tests (cgo)
        run: |
          cargo build --release --manifest-path ../../rust/rrann-core/Cargo.toml
          go test ./...

  c-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install MPFR/GMP
        run: sudo apt-get update && sudo apt-get install -y libgmp-dev libmpfr-dev
      - name: Build staticlib + C smoke
        run: |
          cargo build --release --manifest-path rust/rrann-core/Cargo.toml
          cc -O2 -o cpp/rrann_c_smoke cpp/smoke_test.c -Icpp \
            rust/rrann-core/target/release/librrann_core.a \
            -lm -ldl -lpthread -lgmp -lmpfr
          ./cpp/rrann_c_smoke
